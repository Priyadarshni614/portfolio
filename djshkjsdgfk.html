<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Animated SVG Girl with Typing Effect</title>
<style>
  body {
    background-color: #120f26;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 95vh;
    margin: 0;
    font-family: 'Roboto', sans-serif;
    color: white;
    flex-direction: column;
  }

  svg {
    width: 400px;
    height: auto;
    margin-bottom: 40px;
  }

  /* Lines to animate (example horizontal line) */
  .animated-line {
    stroke-dasharray: 500;
    stroke-dashoffset: 500;
    animation: dash 3s linear forwards infinite;
  }
  @keyframes dash {
    0% {
      stroke-dashoffset: 500;
    }
    50% {
      stroke-dashoffset: 0;
    }
    100% {
      stroke-dashoffset: 500;
    }
  }

  /* Typing text container */
  #typing-text {
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
    font-size: 1.5rem;
    width: 0ch;
    animation: typing 5s steps(30) forwards, blink 0.75s infinite step-end alternate;
  }

  @keyframes typing {
    from { width: 0ch; }
    to { width: 30ch; }
  }
  @keyframes blink {
    0%, 100% { border-color: transparent; }
    50% {border-color: white;}
  }
</style>
</head>
<body>

<!-- Inline simplified SVG example -->
<svg viewBox="0 0 500 500" role="img" aria-label="Girl Illustration">
  <!-- Example running horizontal line -->
  <line x1="50" y1="400" x2="450" y2="400" stroke="#4cc9f0" stroke-width="3" class="animated-line" />

  <!-- Your girl's SVG paths here (simplified example) -->
  <circle cx="250" cy="200" r="80" fill="#f2b6b6" />
  <!-- Add the original full SVG paths here for complete illustration -->

</svg>

<div id="typing-text">Hi, I'm Priyadarshni. A budding web developer.</div>

</body>
</html>
